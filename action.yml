name: 'Swift Android SDK Setup'
author: 'Steffan Andrews'
description: 'Prepare the Swift Android SDK for building Swift packages.'
inputs:
  target-triple:
    description: 'The target triple that will be used when building the Swift package. This is needed during the SDK setup process.'
    required: true

outputs:
  id:
    description: "SDK ID"
    value: ${{ steps.id-finder.outputs.id }}
  url:
    description: "SDK URL"
    value: ${{ steps.id-finder.outputs.platform }}
  checksum:
    description: "SDK checksum"
    value: ${{ steps.id-finder.outputs.platform-short }}

runs:
  using: "composite"
  steps:
    - name: Get Swift Version
      id: swift-version
      shell: bash
      run: $GITHUB_ACTION_PATH/scripts/swift-ver.sh
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
      # outputs:
      #   swift-version
      
    - name: Prepare SDK Info
      id: sdk-info
      shell: bash
      run: $GITHUB_ACTION_PATH/scripts/sdk-info.sh
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        SWIFT_VERSION: ${{ steps.swift-version.outputs.swift-version }}
      # outputs:
      #   sdk-id
      #   sdk-url
      #   sdk-checksum
        
    - name: Install Android SDK for Swift
      shell: bash
      run: swift sdk install "$SDK_URL" --checksum "$SDK_CHECKSUM"
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        SDK_URL: ${{ steps.sdk-info.outputs.sdk-url }}
        SDK_CHECKSUM: ${{ steps.sdk-info.outputs.sdk-checksum }}
      
    # Android NDK is pre-installed on runner image, we just need to run the SDK setup script to link it.
    - name: Setup Android SDK for Swift
      shell: bash
      run: $GITHUB_ACTION_PATH/scripts/setup-sdk.sh
      env:
        GITHUB_ACTION_PATH: ${{ github.action_path }}
        SDK_ID: ${{ steps.sdk-info.outputs.sdk-id }}
        TARGET_TRIPLE: ${{ inputs.target-triple }}
      
branding:
  icon: 'code'
  color: 'blue'
